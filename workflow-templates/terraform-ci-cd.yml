name: CI/CD — Terraform (AWS Infrastructure)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: eu-central-1

concurrency:
  # Serialize Terraform applies — never run two applies simultaneously
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Plan (runs on every PR) ────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: [self-hosted, fps-ci]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt
          echo "plan-exit-code=$?" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            tfplan
            plan.txt
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            const body = `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n*Run ID: ${{ github.run_id }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── Apply (runs on push to main — requires environment approval) ───────────
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: [self-hosted, fps-ci]
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Notify Jira on infrastructure change
        if: always()
        env:
          JIRA_BASE_URL: https://payfelix.atlassian.net
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: luis.walle@payfelix.com
        run: |
          TICKET=$(echo "${{ github.event.head_commit.message }}" | grep -oP '[A-Z]+-\d+' | head -1)
          if [ -n "$TICKET" ]; then
            STATUS="${{ job.status }}"
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            [ "$STATUS" = "success" ] && MSG="✅ Terraform APPLIED to AWS (eu-central-1) | ${RUN_URL}" || MSG="❌ Terraform APPLY FAILED | ${RUN_URL}"
            curl -sf -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
              -X POST "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}/comment" \
              -H "Content-Type: application/json" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"${MSG}\"}]}]}}" || true
          fi
